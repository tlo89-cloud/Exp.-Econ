name: Experience Economy Scraper

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Inject events into HTML
        run: python inject_events.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "Experience Economy Bot"
          git config --global user.email "bot@experience-economy-map"
          git add events.json experience-economy-map.html
          git diff --staged --quiet || git commit -m "Auto-update scraped events"
          git push
